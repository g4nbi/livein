name: Build iOS (Unsigned IPA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Livein (Release, No Sign)
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
        working-directory: Livein

      - name: Build Release (no code signing)
        run: |
          xcodebuild \
            -project Livein.xcodeproj \
            -scheme Livein \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build \
            2>&1 | tee "$RUNNER_TEMP/build.log"
        working-directory: Livein

      - name: Package unsigned IPA
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos/Livein.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Livein.app
          zip -qry Livein-unsigned.ipa Payload
          rm -rf Payload
        working-directory: Livein

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Livein-unsigned-ipa
          path: Livein/Livein-unsigned.ipa
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ runner.temp }}/build.log
          retention-days: 7
