name: Livein
options:
  bundleIdPrefix: com.g4nbi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO
    CLANG_ENABLE_MODULES: YES

targets:
  Livein:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Livein
        excludes:
          - "**/*.example.swift"
    info:
      path: Livein/Info.plist
      properties:
        CFBundleDisplayName: Livein
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "Livein membutuhkan akses kamera untuk streaming."
        NSMicrophoneUsageDescription: "Livein membutuhkan akses mikrofon untuk streaming."
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.g4nbi.livein
        PRODUCT_NAME: Livein
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      configs:
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    scheme:
      shared: true
      buildAction:
        targets:
          - Livein
      testAction:
        targets: []
